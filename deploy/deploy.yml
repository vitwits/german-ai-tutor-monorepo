---
- name: Deployment Playbook for German AI Tutor
  hosts: production
  become: yes
  vars:
    app_dir: "/opt/german_ai_tutor"
    backend_dir: "{{ app_dir }}/backend"
    backup_script_dir: "{{ backend_dir }}/scripts"
    backup_script_path: "{{ backup_script_dir }}/backup_app_db.sh"
    # Defaults (will be assigned via Jenkins -e)
    registry: "{{ nexus_registry | default('localhost:8082') }}"
    version: "{{ app_version | default('latest') }}"

  tasks:
    - name: Ensure application and data directories exist
      file:
        path: "{{ item }}"
        state: directory
        owner: jenkins
        group: docker
        mode: '0775'
      loop:
        - "{{ app_dir }}"
        - "{{ app_dir }}/backend/data"
        - "{{ app_dir }}/backend/static"
        - "{{ app_dir }}/backend"
        - "{{ app_dir }}/backend/scripts"
        - "{{ app_dir }}/frontend"
      register: dir_creation

    - name: Ensure correct permissions for database file
      file:
        path: "{{ app_dir }}/backend/data/app.db"
        owner: jenkins
        group: docker
        mode: '0664'
      ignore_errors: yes # Якщо файлу ще немає, це не помилка

    - name: Create .env file from Jenkins secrets
      copy:
        dest: "{{ app_dir }}/.env"
        content: |
          GEMINI_API_KEY={{ gemini_api_key }}
          SECRET_KEY={{ app_secret_key }}
          GOOGLE_APPLICATION_CREDENTIALS=/var/secrets/service-account.json
          DB_TYPE=sqlite
        owner: jenkins
        mode: '0600'

    - name: Copy service-account.json from Jenkins
      copy:
        src: "{{ service_account_src }}"
        dest: "{{ app_dir }}/service-account.json"
        owner: jenkins
        mode: '0600'

    - name: Synchronize docker-compose.yml
      template:
        src: "../docker-compose.yml"
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: jenkins
        mode: '0644'

    - name: Login to Nexus Registry
      docker_login:
        registry_url: "http://{{ registry }}"
        username: "{{ nexus_user | default(omit) }}"
        password: "{{ nexus_password | default(omit) }}"
        reauthorize: yes

    - name: Deploy application via Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        state: present
        pull: always
        build: never
      environment:
        IMAGE_VERSION: "{{ version }}"
        REGISTRY_URL: "{{ registry }}"

    - name: Copy database backup script
      copy:
        src: "files/backup_app_db.sh"
        dest: "{{ backup_script_path }}"
        owner: jenkins
        group: docker
        mode: '0755'

    - name: Add cron job for database backup
      ansible.builtin.cron:
        name: "backup app.db every 12 hours"
        minute: "0" # Run at minute 0
        hour: "*/12" # Run every 12 hours
        user: jenkins # Run as the jenkins user
        job: "{{ backup_script_path }} >> /var/log/app_db_backup.log 2>&1"
        state: present