server {
    listen 80;
    server_name localhost;

    # PWA файли - НЕ роблять fallback на index.html
    location ~ ^/(manifest\.webmanifest|sw\.js|workbox-.+\.js)$ {
        root /usr/share/nginx/html;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Це важливо для Svelte (tinro): перенаправляє всі шляхи на index.html
        try_files $uri $uri/ /index.html;
    }

    # Проксіюємо запити до API на контейнер бекенду
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Проксіюємо статичні файли (аудіо) на бекенд
    location /static {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}