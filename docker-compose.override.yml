services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./backend/static:/app/static
      - ./service-account.json:/var/secrets/service-account.json:ro

  frontend:
    build:
      context: ./frontend
      target: build-stage # Використовуємо саме Node.js стадію з вашого Dockerfile
    entrypoint: [] # Явно скидаємо точку входу від Nginx
    working_dir: /app
    # Перевизначаємо команду для запуску Vite Dev Server замість Nginx
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
