{% extends "base.html" %}
{% block content %}
<style>
    .speak-container {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        min-height: 70vh; text-align: center; position: relative;
    }
    .mode-switch {
        display: flex; background: var(--surface); border: 1px solid var(--border);
        border-radius: 20px; padding: 4px; margin-bottom: 40px;
    }
    .mode-btn {
        padding: 8px 24px; border-radius: 16px; border: none; background: transparent;
        color: var(--on-surface); font-weight: 500; cursor: pointer; opacity: 0.6; transition: 0.2s;
    }
    .mode-btn.active {
        background: var(--primary); color: var(--on-primary); opacity: 1; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .task-text {
        font-size: 1.5rem; font-weight: 500; margin-bottom: 40px; min-height: 4rem;
        color: var(--on-surface); transition: opacity 0.3s; padding: 0 10px; display: flex; align-items: center; justify-content: center;
    }
    #speaking-card-container {
        min-height: 160px; /* Reserve space to keep button centered */
        display: flex; align-items: center; justify-content: center;
        width: 100%;
    }
    
    /* Controls Container */
    .controls-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        margin-bottom: 40px;
        position: relative;
    }
    
    .mic-wrapper {
        position: relative; width: 168px; height: 168px; /* +20% from 140px */
        display: flex; align-items: center; justify-content: center;
    }
    .mic-btn {
        width: 120px; height: 120px; /* +20% from 100px */
        border-radius: 50%; border: none; background: var(--primary);
        color: var(--on-primary); font-size: 1.2rem; font-weight: 700; cursor: pointer;
        box-shadow: 0 8px 20px rgba(25, 118, 210, 0.3); z-index: 2; transition: transform 0.2s, background-color 0.3s;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .mic-btn:active { transform: scale(0.95); }
    
    .side-btn {
        width: 50px; height: 50px;
        border-radius: 50%; border: 1px solid var(--border); background: var(--surface);
        color: var(--on-surface); display: flex; align-items: center; justify-content: center;
        cursor: pointer; box-shadow: var(--shadow); opacity: 0; pointer-events: none;
        transition: all 0.3s;
    }
    .side-btn.visible { opacity: 1; pointer-events: auto; }
    
    .mic-ring {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 100px; height: 100px; border-radius: 50%; background: var(--primary); opacity: 0.3;
        z-index: 1; transition: width 0.1s, height 0.1s;
    }
    .feedback-area { width: 100%; max-width: 400px; min-height: 100px; }
    .user-transcript { font-style: italic; color: var(--on-surface); opacity: 0.8; margin-bottom: 12px; font-size: 1.2rem; }
    .correction-box {
        background: rgba(76, 175, 80, 0.1); border: 1px solid #4CAF50; color: #2E7D32;
        padding: 12px; border-radius: var(--radius); font-weight: 500; display: none; font-size: 1.2rem;
    }
    .rotating { animation: rotate 1.5s linear infinite; }
    @keyframes rotate {
        from { transform: scaleX(-1) rotate(0deg); }
        to   { transform: scaleX(-1) rotate(-360deg); }
    }
    /* --- SPLASH SCREEN STYLES --- */
    #splash-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
        z-index: 10000; display: none; flex-direction: column;
        align-items: center; justify-content: center; color: white;
        opacity: 0; transition: opacity 0.5s ease;
    }
    
    .score-circle {
        width: 140px; height: 140px;
        display: flex; align-items: center; justify-content: center;
        font-size: 3rem; font-weight: 700; margin-bottom: 40px;
        position: relative;
    }
    
    .score-circle svg {
        position: absolute; top: 0; left: 0;
        width: 100%; height: 100%; transform: rotate(-90deg);
    }
    
    .score-circle circle {
        fill: none; stroke-width: 18; stroke-linecap: round;
    }
    .score-circle-bg { stroke: #333; }
    .score-circle-fg {
        stroke-dasharray: 377; /* 2 * PI * 60 */
        stroke-dashoffset: 377;
        transition: stroke-dashoffset 1.5s ease-out;
    }

    .stats-container { width: 80%; max-width: 300px; }
    
    .stat-row { margin-bottom: 16px; }
    .stat-label { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 6px; opacity: 0.9; }
    
    .progress-bg {
        height: 30px; background: rgba(255,255,255,0.1); border-radius: 9px; overflow: hidden;
    }
    .progress-fill {
        height: 100%; width: 0%; border-radius: 5px;
        transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
    }
    
    /* Unified Icon Styles */
    #btn-icon {
        font-size: 48px;
        font-variation-settings: 'wght' 600;
    }
    #btn-icon.icon-play {
        font-size: 72px; /* 1.5x larger */
    }

    /* Confetti */
    .confetti {
        position: absolute;
        width: 10px; height: 10px;
        top: -20px;
        z-index: 10001;
        pointer-events: none;
    }
    @keyframes fall {
        to { transform: translateY(110vh) rotate(720deg); }
    }

    .report-btn {
        position: absolute; top: 0; right: 0;
        background: none; border: none; color: #d32f2f; opacity: 0.5;
        cursor: pointer; transition: opacity 0.2s; padding: 10px;
    }
    .report-btn:hover { opacity: 1; }
</style>

<!-- SPLASH SCREEN -->
<div id="splash-screen">
    <div class="score-circle" id="splash-circle">
        <svg viewBox="0 0 140 140">
            <circle class="score-circle-bg" cx="70" cy="70" r="60"></circle>
            <circle class="score-circle-fg" cx="70" cy="70" r="60" id="splash-circle-path"></circle>
        </svg>
        <span id="splash-total" style="position: relative; z-index: 1;">0</span>
    </div>
    
    <div class="stats-container">
        <div class="stat-row">
            <div class="stat-label"><span>{{ ui.score_pronunciation if ui.score_pronunciation else 'Pronunciation' }}</span> <span id="val-pron">0</span></div>
            <div class="progress-bg"><div class="progress-fill" id="bar-pron" style="background: #42A5F5;"></div></div>
        </div>
        <div class="stat-row">
            <div class="stat-label"><span>{{ ui.score_context if ui.score_context else 'Accuracy' }}</span> <span id="val-cont">0</span></div>
            <div class="progress-bg"><div class="progress-fill" id="bar-cont" style="background: #66BB6A;"></div></div>
        </div>
        <div class="stat-row">
            <div class="stat-label"><span>{{ ui.score_grammar if ui.score_grammar else 'Grammar' }}</span> <span id="val-gram">0</span></div>
            <div class="progress-bg"><div class="progress-fill" id="bar-gram" style="background: #FFA726;"></div></div>
        </div>
    </div>
</div>

<div class="speak-container">
    <!-- Report Button -->
    <button class="report-btn" title="{{ ui.report_sentence }}"
            hx-post="/api/report_sentence" 
            hx-vals='js:{"id": currentSentenceId}'
            hx-target="#speaking-card-container">
        <span class="material-symbols-outlined">flag</span>
    </button>

    <div class="mode-switch">
        <button class="mode-btn active">{{ ui.speaking_sentences }}</button>
        <button class="mode-btn" style="cursor: not-allowed; opacity: 0.3;">{{ ui.speaking_small_talk }} 🔒</button>
    </div>

    <!-- HTMX Container for the Sentence Card -->
    <div id="speaking-card-container" 
         hx-get="/speaking/next" 
         hx-trigger="load, nextSentence">
    </div>

    <div class="controls-container">
        <!-- Repeat Button -->
        <button class="side-btn" id="repeat-btn" onclick="repeatRound()">
            <span class="material-symbols-outlined">replay</span>
        </button>

        <!-- Main Mic -->
        <div class="mic-wrapper">
            <div class="mic-ring" id="visualizer"></div>
            <button class="mic-btn" id="main-btn" onclick="handleMainClick()">
                <span class="material-symbols-outlined icon-play" id="btn-icon">play_arrow</span>
            </button>
        </div>

        <!-- Fav Button -->
        <button class="side-btn" id="fav-btn" hx-post="/api/toggle_sentence_fav" hx-swap="none" hx-vals='js:{"id": currentSentenceId}'>
            <span class="material-symbols-outlined" id="fav-icon">star</span>
        </button>
    </div>

    <div class="feedback-area">
        <div class="user-transcript" id="transcript-display"></div>
        <div class="correction-box" id="correction-display"></div>
    </div>
</div>

<script>
// UI Constants for external JS
window.UI = {
    cancelled: '{{ ui.speaking_cancelled }}',
    you: '{{ ui.speaking_you }}',
    silence: '{{ ui.speaking_silence }}',
    mic_denied: '{{ ui.speaking_mic_denied }}',
    audio_not_supported: '{{ ui.speaking_audio_not_supported }}',
    error_prefix: '{{ ui.speaking_error }}',
    noise: '{{ ui.speaking_noise }}'
};
</script>
<script src="/static/js/main.js"></script>
{% endblock %}
