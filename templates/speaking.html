{% extends "base.html" %}
{% block content %}
<style>
    .speak-container {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        min-height: 70vh; text-align: center; position: relative;
    }
    .mode-switch {
        display: flex; background: var(--surface); border: 1px solid var(--border);
        border-radius: 20px; padding: 4px; margin-bottom: 40px;
    }
    .mode-btn {
        padding: 8px 24px; border-radius: 16px; border: none; background: transparent;
        color: var(--on-surface); font-weight: 500; cursor: pointer; opacity: 0.6; transition: 0.2s;
    }
    .mode-btn.active {
        background: var(--primary); color: var(--on-primary); opacity: 1; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .task-text {
        font-size: 1.5rem; font-weight: 500; margin-bottom: 40px; min-height: 4rem;
        color: var(--on-surface); transition: opacity 0.3s; padding: 0 10px;
    }
    .mic-wrapper {
        position: relative; width: 140px; height: 140px; display: flex;
        align-items: center; justify-content: center; margin-bottom: 40px;
    }
    .mic-btn {
        width: 100px; height: 100px; border-radius: 50%; border: none; background: var(--primary);
        color: var(--on-primary); font-size: 1.2rem; font-weight: 700; cursor: pointer;
        box-shadow: 0 8px 20px rgba(25, 118, 210, 0.3); z-index: 2; transition: transform 0.2s, background-color 0.3s;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .mic-btn:active { transform: scale(0.95); }
    .mic-ring {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 100px; height: 100px; border-radius: 50%; background: var(--primary); opacity: 0.3;
        z-index: 1; transition: width 0.1s, height 0.1s;
    }
    .feedback-area { width: 100%; max-width: 400px; min-height: 100px; }
    .user-transcript { font-style: italic; color: var(--on-surface); opacity: 0.8; margin-bottom: 12px; font-size: 1.2rem; }
    .correction-box {
        background: rgba(76, 175, 80, 0.1); border: 1px solid #4CAF50; color: #2E7D32;
        padding: 12px; border-radius: var(--radius); font-weight: 500; display: none; font-size: 1.2rem;
    }
    .rotating { animation: rotate 1.5s linear infinite; }
    @keyframes rotate {
        from { transform: scaleX(-1) rotate(0deg); }
        to   { transform: scaleX(-1) rotate(-360deg); }
    }
    /* --- SPLASH SCREEN STYLES --- */
    #splash-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
        z-index: 10000; display: none; flex-direction: column;
        align-items: center; justify-content: center; color: white;
        opacity: 0; transition: opacity 0.5s ease;
    }
    
    .score-circle {
        width: 140px; height: 140px;
        display: flex; align-items: center; justify-content: center;
        font-size: 3rem; font-weight: 700; margin-bottom: 40px;
        position: relative;
    }
    
    .score-circle svg {
        position: absolute; top: 0; left: 0;
        width: 100%; height: 100%; transform: rotate(-90deg);
    }
    
    .score-circle circle {
        fill: none; stroke-width: 18; stroke-linecap: round;
    }
    .score-circle-bg { stroke: #333; }
    .score-circle-fg {
        stroke-dasharray: 377; /* 2 * PI * 60 */
        stroke-dashoffset: 377;
        transition: stroke-dashoffset 1.5s ease-out;
    }

    .stats-container { width: 80%; max-width: 300px; }
    
    .stat-row { margin-bottom: 16px; }
    .stat-label { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 6px; opacity: 0.9; }
    
    .progress-bg {
        height: 30px; background: rgba(255,255,255,0.1); border-radius: 9px; overflow: hidden;
    }
    .progress-fill {
        height: 100%; width: 0%; border-radius: 5px;
        transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
    }
    
    /* Unified Icon Styles */
    #btn-icon {
        font-size: 48px;
        font-variation-settings: 'wght' 600;
    }
    #btn-icon.icon-play {
        font-size: 72px; /* 1.5x larger */
    }

    /* Confetti */
    .confetti {
        position: absolute;
        width: 10px; height: 10px;
        top: -20px;
        z-index: 10001;
        pointer-events: none;
    }
    @keyframes fall {
        to { transform: translateY(110vh) rotate(720deg); }
    }
</style>

<!-- SPLASH SCREEN -->
<div id="splash-screen">
    <div class="score-circle" id="splash-circle">
        <svg viewBox="0 0 140 140">
            <circle class="score-circle-bg" cx="70" cy="70" r="60"></circle>
            <circle class="score-circle-fg" cx="70" cy="70" r="60" id="splash-circle-path"></circle>
        </svg>
        <span id="splash-total" style="position: relative; z-index: 1;">0</span>
    </div>
    
    <div class="stats-container">
        <div class="stat-row">
            <div class="stat-label"><span>{{ ui.score_pronunciation if ui.score_pronunciation else 'Pronunciation' }}</span> <span id="val-pron">0</span></div>
            <div class="progress-bg"><div class="progress-fill" id="bar-pron" style="background: #42A5F5;"></div></div>
        </div>
        <div class="stat-row">
            <div class="stat-label"><span>{{ ui.score_context if ui.score_context else 'Accuracy' }}</span> <span id="val-cont">0</span></div>
            <div class="progress-bg"><div class="progress-fill" id="bar-cont" style="background: #66BB6A;"></div></div>
        </div>
        <div class="stat-row">
            <div class="stat-label"><span>{{ ui.score_grammar if ui.score_grammar else 'Grammar' }}</span> <span id="val-gram">0</span></div>
            <div class="progress-bg"><div class="progress-fill" id="bar-gram" style="background: #FFA726;"></div></div>
        </div>
    </div>
</div>

<div class="speak-container">
    <div class="mode-switch">
        <button class="mode-btn active">{{ ui.speaking_sentences }}</button>
        <button class="mode-btn" style="cursor: not-allowed; opacity: 0.3;">{{ ui.speaking_small_talk }} 🔒</button>
    </div>

    <div class="task-text" id="task-display">{{ ui.speaking_press_start }}</div>

    <div class="mic-wrapper">
        <div class="mic-ring" id="visualizer"></div>
        <button class="mic-btn" id="main-btn" onclick="handleMainClick()">
            <span class="material-symbols-outlined icon-play" id="btn-icon">play_arrow</span>
        </button>
    </div>

    <div class="feedback-area">
        <div class="user-transcript" id="transcript-display"></div>
        <div class="correction-box" id="correction-display"></div>
    </div>
</div>

<script>
const UI = {
    loading: '{{ ui.speaking_loading }}',
    cancelled: '{{ ui.speaking_cancelled }}',
    you: '{{ ui.speaking_you }}',
    silence: '{{ ui.speaking_silence }}',
    mic_denied: '{{ ui.speaking_mic_denied }}',
    audio_not_supported: '{{ ui.speaking_audio_not_supported }}',
    error_prefix: '{{ ui.speaking_error }}',
    press_start: '{{ ui.speaking_press_start }}',
    noise: '{{ ui.speaking_noise }}'
};

// --- STATE ---
let sessionSentences = [];
let currentIndex = 0;
let currentSentence = null;
let isRecording = false;
let isProcessing = false;
let isFetching = false;
let isResultState = false; 
let isRetryState = false;  
let isPlayingAudio = false;
let roundAborted = false;

let mediaRecorder = null;
let audioChunks = [];
let audioContext = null;
let analyser = null;
let micStream = null;

// Змінні для детектора тиші
let silenceCheckInterval = null;
let lastVoiceTimestamp = 0;
let hasUserStartedSpeaking = false;
let recordStartTime = 0;
let currentAudioObj = null;

const NO_SPEECH_TIMEOUT = 5000; 
const SILENCE_AFTER_SPEECH = 2000; 
const NOISE_LEVEL = 15; 

let gameStarted = false;

window.onload = async () => {
    initSession();
    if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert(UI.audio_not_supported);
    }
};

async function initSession() {
    if (isFetching) return;
    isFetching = true;
    try {
        const res = await fetch('/api/get_speaking_session', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'}
        });
        const data = await res.json();
        if (data && Array.isArray(data) && data.length > 0) {
            sessionSentences = data;
            currentIndex = 0;
            console.log(`Session loaded: ${sessionSentences.length} sentences`);
        } else {
            document.getElementById('task-display').innerText = "No sentences found in database. Please generate content in Admin Panel.";
        }
    } catch (e) { console.error(e); } finally { isFetching = false; }
}

async function handleMainClick() {
    if (audioContext && audioContext.state === 'suspended') {
        await audioContext.resume();
    }

    // 1. Interruption Logic: Stop playback if clicked during initial reading
    if (isPlayingAudio) {
        if (currentAudioObj) {
            currentAudioObj.pause();
            currentAudioObj = null;
        }
        isPlayingAudio = false;
        roundAborted = true;
        return;
    }

    if (isRetryState) {
        startCurrentRound(); 
        return;
    }

    if (isResultState) {
        nextRound();
        return;
    }
    
    if (isProcessing) return;

    if (isRecording) {
        // --- ВИПРАВЛЕННЯ ТУТ ---
        // Якщо юзер ще не почав говорити (тиша) і натиснув стоп -> просто скасовуємо
        if (!hasUserStartedSpeaking) {
            stopRecording(false); // upload = false
        } else {
            stopRecording(true);  // upload = true
        }
        return;
    }
    
    if (!gameStarted) {
        gameStarted = true;
        nextRound();
    } else {
        nextRound();
    }
}

async function nextRound() {
    isResultState = false;
    isRetryState = false;

    if (sessionSentences.length === 0) {
        await initSession();
        if (sessionSentences.length === 0) return; // Stop if still empty
    }
    
    if (currentIndex >= sessionSentences.length) {
        await initSession(); // Reshuffle and restart
        if (sessionSentences.length === 0) return;
    }
    
    currentSentence = sessionSentences[currentIndex++];
    startCurrentRound();
}

async function startCurrentRound() {
    if (!currentSentence) return;
    
    isResultState = false;
    isRetryState = false;
    roundAborted = false;

    document.getElementById('transcript-display').innerText = '';
    document.getElementById('correction-display').style.display = 'none';
    updateUIState('idle');

    // Визначаємо текст для показу (переклад)
    const langKey = '{{ "text_uk" if lang == "ukr" else "text_en" }}';
    const sourceText = currentSentence[langKey] || currentSentence['text_en']; // Fallback

    const taskEl = document.getElementById('task-display');
    taskEl.style.opacity = 0;
    taskEl.innerText = sourceText;
    
    setTimeout(() => { taskEl.style.opacity = 1; }, 100);
    
    // Програємо аудіо (джерело)
    isPlayingAudio = true;
    await playAudioFile(currentSentence['{{ "audio_uk" if lang == "ukr" else "audio_en" }}']);
    isPlayingAudio = false;

    // Check if aborted
    if (roundAborted) {
        isRetryState = true;
        updateUIState('idle');
        const icon = document.getElementById('btn-icon');
        icon.innerText = 'play_arrow';
        icon.classList.add('icon-play');
        return;
    }
    
    playBeep();
    startRecording();
}

async function startRecording() {
    try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const options = MediaRecorder.isTypeSupported('audio/webm') ? { mimeType: 'audio/webm' } : {};
        mediaRecorder = new MediaRecorder(micStream, options);
        audioChunks = [];

        mediaRecorder.ondataavailable = event => {
            if (event.data.size > 0) audioChunks.push(event.data);
        };
        
        mediaRecorder.shouldUpload = false;

        mediaRecorder.onstop = async () => {
            micStream.getTracks().forEach(track => track.stop());
            
            if (mediaRecorder.shouldUpload) {
                const mimeType = mediaRecorder.mimeType || 'audio/webm';
                const audioBlob = new Blob(audioChunks, { type: mimeType });
                processAudioBlob(audioBlob);
            } else {
                console.log("Recording cancelled (manual or silence).");
                updateUIState('idle');
                document.getElementById('transcript-display').innerText = UI.cancelled;
                isRetryState = true; 
                
                // Змінюємо іконку на refresh
                const icon = document.getElementById('btn-icon');
                icon.innerText = 'refresh';
                icon.classList.remove('icon-play');
            }
        };

        mediaRecorder.start();
        isRecording = true;
        updateUIState('listening');
        initAudioAndSilenceDetector(micStream);

    } catch (e) {
        console.error(e);
        window.toast.show(UI.mic_denied, "error");
        updateUIState('idle');
    }
}

function stopRecording(upload = true) {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.shouldUpload = upload;
        mediaRecorder.stop();
    }
    if (silenceCheckInterval) clearInterval(silenceCheckInterval);
    isRecording = false;
    
    if (upload) {
        isProcessing = true;
        updateUIState('processing');
    }
}

async function initAudioAndSilenceDetector(stream) {
    try {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        if (audioContext.state === 'suspended') await audioContext.resume();
        
        analyser = audioContext.createAnalyser();
        const src = audioContext.createMediaStreamSource(stream);
        src.connect(analyser);
        analyser.fftSize = 256;
        
        drawVisualizer();
        
        hasUserStartedSpeaking = false;
        lastVoiceTimestamp = Date.now();
        recordStartTime = Date.now();
        
        if (silenceCheckInterval) clearInterval(silenceCheckInterval);
        
        silenceCheckInterval = setInterval(() => {
            if (!isRecording) return;
            
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);
            
            let sum = 0;
            for(let i = 0; i < bufferLength; i++) sum += dataArray[i];
            let average = sum / bufferLength;
            
            if (average > NOISE_LEVEL) {
                if (!hasUserStartedSpeaking) hasUserStartedSpeaking = true;
                lastVoiceTimestamp = Date.now();
            } else {
                const now = Date.now();
                if (hasUserStartedSpeaking) {
                    if (now - lastVoiceTimestamp > SILENCE_AFTER_SPEECH) {
                        stopRecording(true); 
                    }
                } else {
                    if (now - recordStartTime > NO_SPEECH_TIMEOUT) {
                        stopRecording(false); 
                    }
                }
            }
        }, 100); 
    } catch (e) { console.error(e); }
}

async function processAudioBlob(blob) {
    const formData = new FormData();
    formData.append('audio', blob);
    // Відправляємо оригінальний німецький текст для порівняння
    formData.append('original_text', currentSentence.text_de);

    try {
        const res = await fetch('/api/evaluate_audio', { method: 'POST', body: formData });
        const rawData = await res.json();
        let result = Array.isArray(rawData) ? (rawData.length > 0 ? rawData[0] : null) : rawData;

        if (!result) throw new Error("Empty response");
        showFeedback(result);
    } catch (e) {
        console.error(e);
        showFeedback({ average_score: 0, feedback: UI.error_prefix + e.message, transcribed_text: "" });
    }
}

async function showFeedback(result) {
    isProcessing = false;
    isResultState = true; 

    if (result.transcribed_text) {
        if (result.transcribed_text.includes('[NOISE]')) {
            document.getElementById('transcript-display').innerText = UI.noise;
        } else {
            document.getElementById('transcript-display').innerText = `${UI.you}: "${result.transcribed_text}"`;
        }
    } else {
        document.getElementById('transcript-display').innerText = UI.silence;
    }

    updateUIState('next');

    // --- SPLASH SCREEN LOGIC ---
    const splash = document.getElementById('splash-screen');
    const circlePath = document.getElementById('splash-circle-path');
    const circle = document.getElementById('splash-circle');
    
    // Scores
    const avg = result.average_score || 0;
    const p = result.pronunciation_score || 0;
    const c = result.context_score || 0;
    const g = result.grammar_score || 0;

    // Color logic
    let color = '#f44336'; // Red
    if (avg >= 80) color = '#4CAF50'; // Green
    else if (avg >= 50) color = '#FFC107'; // Orange
    
    circlePath.style.stroke = color;

    // Confetti if score >= 90
    if (avg >= 90) {
        launchConfetti();
    }

    // Show Splash
    splash.style.display = 'flex';
    // Force reflow
    void splash.offsetWidth;
    splash.style.opacity = '1';

    // Animate Circle
    const circumference = 377;
    const offset = circumference - (avg / 100) * circumference;
    setTimeout(() => {
        circlePath.style.strokeDashoffset = offset;
    }, 100);

    // Animate Counter
    animateValue("splash-total", 0, avg, 1500);
    animateValue("val-pron", 0, p, 1500);
    animateValue("val-cont", 0, c, 1500);
    animateValue("val-gram", 0, g, 1500);

    // Animate Bars
    setTimeout(() => {
        document.getElementById('bar-pron').style.width = p + '%';
        document.getElementById('bar-cont').style.width = c + '%';
        document.getElementById('bar-gram').style.width = g + '%';
    }, 100);

    // Play Feedback Audio
    if (result.feedback_audio_url) {
        const audio = new Audio(result.feedback_audio_url);
        audio.play();
    }

    // Correction logic (shown after splash)
    const corrBox = document.getElementById('correction-display');
    corrBox.innerText = currentSentence.text_de;
    corrBox.style.display = 'block';

    // Hide Splash after 5s
    setTimeout(() => {
        splash.style.opacity = '0';
        setTimeout(() => {
            splash.style.display = 'none';
            // Reset animations for next time
            circlePath.style.strokeDashoffset = 377;
            document.getElementById('bar-pron').style.width = '0%';
            document.getElementById('bar-cont').style.width = '0%';
            document.getElementById('bar-gram').style.width = '0%';
            
            // Reset button state
            const btn = document.getElementById('main-btn');
            const icon = document.getElementById('btn-icon');
            btn.style.backgroundColor = 'var(--primary)';
            icon.style.display = 'block';
            icon.innerText = 'play_arrow';
            icon.classList.add('icon-play');

            // Clear confetti
            const confettis = document.querySelectorAll('.confetti');
            confettis.forEach(c => c.remove());
            
            // Play correct German audio
            playAudioFile(currentSentence.audio_de);
        }, 500);
    }, 4000);
}

function launchConfetti() {
    const colors = ['#FFC107', '#2196F3', '#4CAF50', '#F44336', '#9C27B0'];
    const container = document.getElementById('splash-screen');
    
    for (let i = 0; i < 50; i++) {
        const el = document.createElement('div');
        el.classList.add('confetti');
        el.style.left = Math.random() * 100 + '%';
        el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        el.style.animation = `fall ${Math.random() * 3 + 2}s linear forwards`;
        container.appendChild(el);
    }
}

function animateValue(id, start, end, duration) {
    const obj = document.getElementById(id);
    let startTimestamp = null;
    const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        obj.innerHTML = Math.floor(progress * (end - start) + start);
        if (progress < 1) {
            window.requestAnimationFrame(step);
        }
    };
    window.requestAnimationFrame(step);
}

function updateUIState(state) {
    const btn = document.getElementById('main-btn');
    const ring = document.getElementById('visualizer');
    const icon = document.getElementById('btn-icon');
    
    icon.classList.remove('rotating');
    icon.classList.remove('icon-play');

    if (state === 'listening') {
        btn.style.backgroundColor = '#d32f2f'; 
        icon.style.display = 'block'; icon.innerText = 'stop';
        ring.style.display = 'block';
    } else if (state === 'processing') {
        btn.style.backgroundColor = '#9E9E9E'; 
        ring.style.display = 'none'; icon.style.display = 'block';
        icon.innerText = 'sync'; icon.classList.add('rotating');
    } else if (state === 'next') {
        ring.style.display = 'none'; icon.style.display = 'none';
    } else {
        // IDLE / RETRY
        btn.style.backgroundColor = 'var(--primary)';
        ring.style.display = 'none'; icon.style.display = 'block';
        
        if (!gameStarted) {
            icon.innerText = 'play_arrow';
            icon.classList.add('icon-play');
        } else {
            icon.innerText = isRetryState ? 'refresh' : 'mic'; 
        }
    }
}

async function playAudioFile(path) {
    if(!path) return;
    if (currentAudioObj) { currentAudioObj.pause(); currentAudioObj = null; }
    
    currentAudioObj = new Audio('/static/audio/sentences/' + path);
    return new Promise(resolve => {
        currentAudioObj.onended = resolve; currentAudioObj.onerror = resolve;
        currentAudioObj.onpause = resolve; // Handle interruption
        currentAudioObj.play().catch(e => resolve());
    });
}

function playBeep() {
    try {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.frequency.value = 600;
        gain.gain.value = 0.1;
        osc.start();
        setTimeout(() => osc.stop(), 150);
    } catch(e) { console.error("Beep error", e); }
}

function drawVisualizer() {
    if (!isRecording) return;
    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);
    analyser.getByteFrequencyData(dataArray);
    let sum = 0;
    for(let i = 0; i < bufferLength; i++) sum += dataArray[i];
    let average = sum / bufferLength;
    const scale = 1 + (average / 150); 
    const ring = document.getElementById('visualizer');
    ring.style.transform = `translate(-50%, -50%) scale(${scale})`;
    requestAnimationFrame(drawVisualizer);
}

window.addEventListener('level-updated', async () => {
    // 1. Hard stop recording if active
    if (isRecording && mediaRecorder) {
        mediaRecorder.onstop = null; 
        mediaRecorder.stop();
        if(micStream) micStream.getTracks().forEach(track => track.stop());
    }
    if (silenceCheckInterval) clearInterval(silenceCheckInterval);
    
    sessionSentences = [];
    // 2. Reset State
    isRecording = false;
    isProcessing = false;
    isResultState = false;
    isRetryState = false;
    gameStarted = false;
    currentSentence = null;
    isFetching = false; // Force allow new fetch
    
    // 3. Reset UI
    updateUIState('idle');
    document.getElementById('transcript-display').innerText = '';
    document.getElementById('correction-display').style.display = 'none';
    document.getElementById('task-display').innerText = UI.press_start;
    
    // 4. Fetch new sentences & Restore UI
    await initSession();
});
</script>

{% endblock %}
