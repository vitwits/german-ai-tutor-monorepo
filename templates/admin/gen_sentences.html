{% extends 'admin/master.html' %}

{% block body %}
<div class="container">
    <h2>Generate New Sentences</h2>
    
    <div class="panel panel-default">
        <div class="panel-body">
            <form method="POST" action="{{ url_for('generate.start_text_gen') }}" class="form-inline">
                <div class="form-group">
                    <label>Level:</label>
                    <select name="level" class="form-control">
                        <option value="A1">A1</option>
                        <option value="A2">A2</option>
                        <option value="B1">B1</option>
                        <option value="B2">B2</option>
                        <option value="C1">C1</option>
                        <option value="C2">C2</option>
                    </select>
                </div>
                <div class="form-group" style="margin-left: 10px;">
                    <label>Count:</label>
                    <input type="number" name="count" value="10" class="form-control" style="width: 80px;">
                </div>
                <button type="submit" class="btn btn-primary" style="margin-left: 10px;">Generate Text</button>
            </form>
        </div>
    </div>

    <h3>Batches</h3>
    <table class="table table-striped table-bordered">
        <thead>
            <tr>
                <th>Name</th>
                <th>Status</th>
                <th>Progress</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for b in batches %}
            <tr id="batch-{{ b.id }}" data-status="{{ b.status }}">
                <td>{{ b.name }}</td>
                <td>
                    <span class="label label-{{ 'success' if b.status == 'text_ready' else 'info' if 'generating' in b.status else 'danger' }}">
                        {{ b.status }}
                    </span>
                </td>
                <td>
                    <div class="progress" style="margin-bottom: 0; min-width: 150px;">
                        <div class="progress-bar progress-bar-striped active" role="progressbar" 
                             style="width: {{ (b.processed_count / b.target_count * 100)|int }}%;">
                            {{ b.processed_count }} / {{ b.target_count }}
                        </div>
                    </div>
                </td>
                <td>
                    {% if b.status == 'text_ready' %}
                    <a href="{{ url_for('generate.edit_batch', batch_id=b.id) }}" class="btn btn-sm btn-warning">Edit & Review</a>
                    {% endif %}
                    
                    <form action="{{ url_for('generate.delete_batch', batch_id=b.id) }}" method="POST" style="display:inline;" onsubmit="return confirm('Delete batch?');">
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<script>
    function updateStatus() {
        document.querySelectorAll('tr[data-status]').forEach(row => {
            const status = row.getAttribute('data-status');
            if (status.includes('generating')) {
                const id = row.id.split('-')[1];
                fetch('/admin/generate/api/batch_status/' + id)
                    .then(r => r.json())
                    .then(data => {
                        // Update Progress Bar
                        const pct = Math.round((data.processed / data.total) * 100);
                        const bar = row.querySelector('.progress-bar');
                        bar.style.width = pct + '%';
                        bar.innerText = data.processed + ' / ' + data.total;
                        
                        // Update Label
                        row.querySelector('.label').innerText = data.status;
                        
                        // Reload if status changed to ready or completed (to show buttons or remove row)
                        if (data.status !== status) {
                            location.reload();
                        }
                    });
            }
        });
    }
    
    // Poll every 2 seconds
    setInterval(updateStatus, 2000);
</script>
{% endblock %}
