{% extends "base.html" %}
{% block content %}
<style>
    .auth-container { max-width: 400px; margin: 60px auto; padding: 40px; text-align: center; }
    .form-group { margin-bottom: 20px; text-align: left; }
    .form-control {
        width: 100%; padding: 12px; border: 1px solid var(--border);
        border-radius: var(--radius); background: var(--bg); color: var(--on-surface);
        font-size: 16px; box-sizing: border-box; transition: all 0.2s;
    }
    .form-control:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1); }
    .auth-header { margin-bottom: 30px; }
    .auth-icon { font-size: 48px; color: var(--primary); margin-bottom: 10px; }
</style>

<div class="card auth-container">
    <div class="auth-header">
        <span class="material-symbols-outlined auth-icon">login</span>
        <h2 style="margin: 0; color: var(--primary); font-weight: 500; letter-spacing: 1px;">{{ ui.login_header.upper() }}</h2>
    </div>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for m in messages %}
            <div style="background: #ffebee; color: #c62828; padding: 10px; border-radius: 4px; margin-bottom: 20px; font-size: 0.9rem;">
                {{ m }}
            </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="form-group">
            <label style="font-size: 0.85rem; font-weight: 500; margin-bottom: 6px; display: block; opacity: 0.7;">Email</label>
            <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
            <label style="font-size: 0.85rem; font-weight: 500; margin-bottom: 6px; display: block; opacity: 0.7;">{{ ui.password }}</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-contained" style="width: 100%; height: 48px; justify-content: center; font-size: 1rem; margin-top: 10px;">
            {{ ui.login_btn }}
        </button>
    </form>
    <p style="margin-top: 24px; font-size: 0.9rem; opacity: 0.8;">
        {{ ui.no_account }} <a href="/register" style="color: var(--primary); text-decoration: none; font-weight: 500;">{{ ui.register_link }}</a>
    </p>
</div>
{% endblock %}
