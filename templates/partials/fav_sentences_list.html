<style>
    /* --- CARD STYLES --- */
    .sentence-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px 20px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 16px;
        box-shadow: var(--shadow);
        transition: transform 0.2s;
    }
    .sent-content {
        flex: 1;
    }
    .sent-de {
        font-size: 1.1rem;
        font-weight: 500;
        margin-bottom: 6px;
        color: var(--primary);
    }
    .sent-trans {
        font-size: 0.95rem;
        opacity: 0.8;
        color: var(--on-surface);
    }
    
    /* --- PLAYER STYLES --- */
    .play-all-container {
        margin-bottom: 20px;
    }
    .btn-rect {
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--on-surface);
        padding: 8px 16px;
        border-radius: var(--radius);
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        transition: background 0.2s;
    }
    .btn-rect:hover { background: rgba(0,0,0,0.05); }

    #player-splash {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: var(--bg); 
        z-index: 10000;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--on-surface);
    }
    
    #player-canvas {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        opacity: 0.2; pointer-events: none;
    }
    
    .player-content {
        z-index: 2; text-align: center; padding: 20px; width: 90%; max-width: 600px;
        flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
    }
    
    .player-sent-de { font-size: 1.5rem; font-weight: 500; margin-bottom: 24px; color: var(--primary); line-height: 1.4; }
    .player-sent-trans { font-size: 1.1rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.4; }
    
    .player-controls {
        display: flex; align-items: center; justify-content: center; gap: 24px;
        margin-bottom: 60px; z-index: 2;
    }
    
    .ctrl-btn {
        background: none; border: none; color: var(--on-surface); cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: transform 0.1s, color 0.2s;
        padding: 0;
    }
    .ctrl-btn:active { transform: scale(0.9); }
    .ctrl-btn.active { color: var(--primary); }
    
    .ctrl-btn-lg { 
        width: 72px; height: 72px; border-radius: 50%; 
        background: var(--primary); color: var(--on-primary); 
        box-shadow: 0 6px 16px rgba(0,0,0,0.2); 
    }
    .ctrl-btn-md { width: 48px; height: 48px; opacity: 0.9; }
    .ctrl-btn-sm { width: 40px; height: 40px; opacity: 0.6; }
    
    .close-player-btn {
        position: absolute; top: 24px; right: 24px; z-index: 3;
        background: none; border: none; color: var(--on-surface); cursor: pointer;
        padding: 8px;
    }
    
    /* Animation for active state */
    .ctrl-btn.active-state { color: var(--primary); opacity: 1; }
</style>

<!-- PLAYER SPLASH SCREEN -->
<div id="player-splash">
    <canvas id="player-canvas"></canvas>
    <button class="close-player-btn" onclick="closePlayer()">
        <span class="material-symbols-outlined" style="font-size: 32px;">close</span>
        <div style="font-size: 0.9rem; font-weight: bold; opacity: 0.8; text-align: center; margin-top: 2px;">Esc</div>
    </button>
    
    <div class="player-content">
        <div id="p-sent-de" class="player-sent-de"></div>
        <div id="p-sent-trans" class="player-sent-trans"></div>
        
        <div class="player-controls">
            <button class="ctrl-btn ctrl-btn-sm" onclick="toggleLoop()" id="btn-loop" title="Loop">
                <span class="material-symbols-outlined">repeat</span>
            </button>
            <button class="ctrl-btn ctrl-btn-md" onclick="playPrev()">
                <span class="material-symbols-outlined" style="font-size: 36px;">skip_previous</span>
            </button>
            <button class="ctrl-btn ctrl-btn-lg" onclick="togglePlay()" id="btn-play-pause">
                <span class="material-symbols-outlined" style="font-size: 40px;">pause</span>
            </button>
            <button class="ctrl-btn ctrl-btn-md" onclick="playNext()">
                <span class="material-symbols-outlined" style="font-size: 36px;">skip_next</span>
            </button>
            <button class="ctrl-btn ctrl-btn-sm" onclick="toggleShuffle()" id="btn-shuffle" title="Mix">
                <span class="material-symbols-outlined">shuffle</span>
            </button>
        </div>
    </div>
</div>

<div class="vocab-wrapper list">
<div class="play-all-container" style="text-align: left;">
    <button class="btn-contained" onclick="openPlayer()" style="height: 36px; font-size: 0.85rem; background: var(--secondary); color: #000;">
        <span class="material-symbols-outlined">play_arrow</span>
        {{ ui.play_all }}
    </button>
</div>

<div class="vocab-wrapper list">
    {% for s in sentences %}
    <div class="sentence-card">
        <button class="btn-text" onclick="playSentencePair('{{ s.audio_de }}', '{{ s.display_audio }}', this)" style="color: var(--primary); min-width: 40px; padding: 8px;">
            <span class="material-symbols-outlined" style="font-size: 28px;">volume_up</span>
        </button>
        
        <div class="sent-content">
            <div class="sent-de">{{ s.text_de }}</div>
            <div class="sent-trans">{{ s.display_trans }}</div>
        </div>
        
        <button class="btn-text" style="color: #d32f2f; min-width: 40px; opacity: 0.7;"
                onclick="requestDelete(this, '/api/remove_fav_sentence', {id: '{{ s.fav_id }}'}, '{{ ui.sentence_removed_fav }}')">
            <span class="material-symbols-outlined">delete</span>
        </button>
    </div>
    {% else %}
    <div style="text-align: center; padding: 40px; opacity: 0.6;">
        No favorite sentences yet.
    </div>
    {% endfor %}
</div>

{% if total_pages > 1 %}
<div style="display: flex; justify-content: center; gap: 6px; margin-top: 24px; align-items: center;">
    <button class="page-btn {% if page <= 1 %}disabled{% endif %}" 
            {% if page > 1 %}hx-get="/vocab?mode=sentences&page={{ page - 1 }}" hx-target="#vocab-container" hx-swap="innerHTML"{% endif %}
            {% if page <= 1 %}disabled{% endif %}>
        <span class="material-symbols-outlined" style="font-size: 18px;">chevron_left</span>
    </button>

    <div class="page-btn active" style="cursor:default;">{{ page }}</div>

    <button class="page-btn {% if page >= total_pages %}disabled{% endif %}" 
            {% if page < total_pages %}hx-get="/vocab?mode=sentences&page={{ page + 1 }}" hx-target="#vocab-container" hx-swap="innerHTML"{% endif %}
            {% if page >= total_pages %}disabled{% endif %}>
        <span class="material-symbols-outlined" style="font-size: 18px;">chevron_right</span>
    </button>
</div>
{% endif %}

<script>
var playlist = {{ sentences | tojson }};
var pIndex = 0;
var pAudio = null;
var pIsPlaying = false;
var pIsLoop = false;
var pIsShuffle = false;
var pCanvas = document.getElementById('player-canvas');
var pCtx = pCanvas ? pCanvas.getContext('2d') : null;
var pAnimId = null;

function openPlayer() {
    if(playlist.length === 0) return;
    document.getElementById('player-splash').style.display = 'flex';
    pIndex = 0;
    pIsPlaying = true;
    updatePlayerUI();
    playCurrentSentence();
    startVisualizer();
}

function closePlayer() {
    document.getElementById('player-splash').style.display = 'none';
    stopAudio();
    pIsPlaying = false;
    if(pAnimId) cancelAnimationFrame(pAnimId);
    if (document.activeElement) document.activeElement.blur(); // Remove focus from trigger button
}

function stopAudio() {
    if(pAudio) {
        pAudio.pause();
        pAudio = null;
    }
}

async function playCurrentSentence() {
    if(!pIsPlaying) return;
    stopAudio();
    
    const item = playlist[pIndex];
    if(!item) return;
    
    // Update Text
    document.getElementById('p-sent-de').innerText = item.text_de;
    document.getElementById('p-sent-trans').innerText = item.display_trans;
    updatePlayPauseIcon(true);

    // Play DE
    await playAudioFile(item.audio_de);
    if(!pIsPlaying) return;
    
    // Pause
    await new Promise(r => setTimeout(r, 600));
    if(!pIsPlaying) return;
    
    // Play Trans
    if(item.display_audio) {
        await playAudioFile(item.display_audio);
    }
    
    if(!pIsPlaying) return;
    
    // Pause before next
    await new Promise(r => setTimeout(r, 1000));
    if(!pIsPlaying) return;
    
    playNext(true); // Auto next
}

function playAudioFile(path) {
    return new Promise(resolve => {
        if(!path) { resolve(); return; }
        pAudio = new Audio('/static/audio/sentences/' + path);
        pAudio.onended = resolve;
        pAudio.onerror = resolve;
        pAudio.play().catch(e => resolve());
    });
}

function togglePlay() {
    pIsPlaying = !pIsPlaying;
    updatePlayPauseIcon(pIsPlaying);
    if(pIsPlaying) playCurrentSentence();
    else stopAudio();
}

function playNext(auto = false) {
    if(pIsShuffle) {
        pIndex = Math.floor(Math.random() * playlist.length);
    } else {
        pIndex++;
        if(pIndex >= playlist.length) {
            if(pIsLoop) pIndex = 0;
            else {
                pIndex = playlist.length - 1;
                pIsPlaying = false;
                updatePlayPauseIcon(false);
                return;
            }
        }
    }
    if(!auto) pIsPlaying = true;
    playCurrentSentence();
}

function playPrev() {
    pIndex--;
    if(pIndex < 0) pIndex = playlist.length - 1;
    pIsPlaying = true;
    playCurrentSentence();
}

function toggleLoop() {
    pIsLoop = !pIsLoop;
    document.getElementById('btn-loop').classList.toggle('active-state', pIsLoop);
}

function toggleShuffle() {
    pIsShuffle = !pIsShuffle;
    document.getElementById('btn-shuffle').classList.toggle('active-state', pIsShuffle);
}

function updatePlayPauseIcon(playing) {
    const icon = document.querySelector('#btn-play-pause span');
    if(icon) icon.innerText = playing ? 'pause' : 'play_arrow';
}

function updatePlayerUI() {
    document.getElementById('btn-loop').classList.toggle('active-state', pIsLoop);
    document.getElementById('btn-shuffle').classList.toggle('active-state', pIsShuffle);
}

// Visualizer
function startVisualizer() {
    if(!pCanvas) return;
    pCanvas.width = window.innerWidth;
    pCanvas.height = window.innerHeight;
    let time = 0;
    
    function animate() {
        pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
        pCtx.beginPath();
        pCtx.strokeStyle = 'rgba(25, 118, 210, 0.3)';
        pCtx.lineWidth = 2;
        
        for(let x = 0; x < pCanvas.width; x++) {
            // Simple sine wave simulation
            const y = pCanvas.height / 2 + Math.sin(x * 0.01 + time) * 50 * (pIsPlaying ? 1 : 0.1) + Math.sin(x * 0.02 + time * 1.5) * 20;
            if(x===0) pCtx.moveTo(x, y); else pCtx.lineTo(x, y);
        }
        pCtx.stroke();
        time += 0.05;
        pAnimId = requestAnimationFrame(animate);
    }
    animate();
}

// Esc key support
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && document.getElementById('player-splash').style.display === 'flex') {
        closePlayer();
    }
});

// Cleanup on navigation (HTMX)
if (!window.favSentencesCleanup) {
    window.favSentencesCleanup = function() {
        if (typeof closePlayer === 'function') closePlayer();
    };
    document.body.addEventListener('htmx:before-swap', window.favSentencesCleanup);
}
</script>
