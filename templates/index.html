{% extends "base.html" %}
{% block content %}
<style>
    .form-container { max-width: 500px; margin: 40px auto; padding: 40px; text-align: center; }
    .form-group { margin-bottom: 20px; text-align: left; }
    .form-label { font-size: 0.85rem; font-weight: 500; margin-bottom: 8px; display: block; opacity: 0.8; }
    .form-control {
        width: 100%; padding: 12px; border: 1px solid var(--border);
        border-radius: var(--radius); background: var(--bg); color: var(--on-surface);
        font-size: 16px; box-sizing: border-box; transition: all 0.2s;
    }
    .form-control:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1); }
    .header-section { margin-bottom: 30px; }
    .header-icon { font-size: 48px; color: var(--primary); margin-bottom: 10px; }
</style>

<div class="card form-container">
    <div class="header-section">
        <span class="material-symbols-outlined header-icon">auto_stories</span>
        <h2 style="margin: 0; color: var(--primary); font-weight: 500; letter-spacing: 1px;">СТВОРИТИ УРОК</h2>
    </div>

    <div class="form-group">
        <label class="form-label">Тема уроку</label>
        <input type="text" id="topic" class="form-control" placeholder="Наприклад: Подорож, IT, Спорт..." autofocus>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="form-group">
            <label class="form-label">Рівень</label>
            <select id="lvl" class="form-control">{% for l in ['A1','A2','B1','B2','C1'] %}<option value="{{l}}">{{l}}</option>{% endfor %}</select>
        </div>
        <div class="form-group">
            <label class="form-label">Кількість речень</label>
            <select id="count" class="form-control">{% for i in range(5, 31, 5) %}<option value="{{i}}">{{i}}</option>{% endfor %}</select>
        </div>
    </div>

    <div class="form-group">
        <label class="form-label">Мова перекладу</label>
        <select id="lng" class="form-control"><option value="ukr">Українська</option><option value="eng">English</option></select>
    </div>

    <button class="btn-contained" onclick="generate()" id="gen-btn" style="width: 100%; height: 48px; justify-content: center; font-size: 1rem; margin-top: 10px;">
            <span class="material-symbols-outlined">auto_awesome</span> Згенерувати
    </button>
</div>
<script>
async function generate() {
    const btn = document.getElementById('gen-btn');
    btn.disabled = true; btn.innerHTML = 'Генерація...';
    try {
        const res = await fetch('/api/generate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                topic: document.getElementById('topic').value,
                count: document.getElementById('count').value,
                level: document.getElementById('lvl').value,
                lang: document.getElementById('lng').value
            })
        });
        const data = await res.json();
        location.href = '/view/' + data.id;
    } catch (e) { alert('Помилка'); btn.disabled = false; btn.innerHTML = 'Згенерувати'; }
}
</script>
{% endblock %}
