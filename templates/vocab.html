{% extends "base.html" %}
{% block content %}
<style>
    .view-btn {
        background: transparent; border: 1px solid var(--border); color: var(--on-surface);
        width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center;
        cursor: pointer; border-radius: var(--radius); opacity: 0.6;
        text-decoration: none !important;
    }
    .view-btn.active { background: var(--primary); color: var(--on-primary); border-color: var(--primary); opacity: 1; }

    /* --- LIST VIEW STYLES --- */
    .vocab-wrapper.list {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }
    .vocab-wrapper.list .vocab-item {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
    }

    /* --- GRID VIEW STYLES --- */
    .vocab-wrapper.grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
    }
    
    /* 3D Flip Container */
    .vocab-wrapper.grid .vocab-item {
        height: 190px; /* Fixed height */
        perspective: 1000px;
        background: transparent;
        border: none;
        box-shadow: none;
        position: relative;
    }
    
    .vocab-wrapper.grid .vocab-card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        text-align: center;
        transition: transform 0.6s;
        transform-style: preserve-3d;
        transform: translateZ(0); /* Fix for rendering glitches */
    }

    .vocab-wrapper.grid .vocab-item.flipped .vocab-card-inner {
        transform: rotateY(180deg) translateZ(0);
    }
    
    .vocab-wrapper.grid .item-content {
        position: relative;
        z-index: 1;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
        padding: 10px 16px; /* Зменшено вертикальний відступ */
    }

    /* Faces */
    .vocab-wrapper.grid .vocab-face {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
        background: var(--surface);
        display: flex;
        flex-direction: column;
    }

    /* Fix for interaction: disable pointer events on hidden faces */
    .vocab-wrapper.grid .vocab-front { pointer-events: auto; }
    .vocab-wrapper.grid .vocab-back { pointer-events: none; }
    .vocab-wrapper.grid .vocab-item.flipped .vocab-front { pointer-events: none; }
    .vocab-wrapper.grid .vocab-item.flipped .vocab-back { pointer-events: auto; }

    .vocab-wrapper.grid .vocab-back {
        transform: rotateY(180deg);
        padding: 16px 16px 8px 16px;
        box-sizing: border-box;
        text-align: center;
        display: flex;
        flex-direction: column;
    }

    .vocab-wrapper.grid .vocab-back-scroll {
        flex: 1;
        overflow-y: auto;
        scrollbar-width: thin;
        display: flex;
        flex-direction: column;
        width: 100%;
    }

    .vocab-wrapper.grid .vocab-back-scroll > div {
        margin: auto; /* Центрує вертикально, якщо текст малий, і дозволяє скрол, якщо великий */
    }

    /* Стилізація скролбару */
    .vocab-wrapper.grid .vocab-back-scroll::-webkit-scrollbar { width: 4px; }
    .vocab-wrapper.grid .vocab-back-scroll::-webkit-scrollbar-track { background: transparent; }
    .vocab-wrapper.grid .vocab-back-scroll::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.2); border-radius: 4px; }

    /* Footer для Grid View */
    .grid-footer {
        display: none;
    }
    .vocab-wrapper.grid .grid-footer {
        display: flex;
        justify-content: space-around;
        align-items: center;
        height: 48px; /* ~18% від висоти картки */
        background-color: rgba(0,0,0,0.02);
        border-top: 1px solid var(--border);
        z-index: 2;
    }
    
    /* Приховуємо елементи списку в режимі сітки */
    .vocab-wrapper.grid .list-audio-btn,
    .vocab-wrapper.grid .list-tools {
        display: none !important;
    }
    
    /* Приховуємо футер в режимі списку */
    .vocab-wrapper.list .grid-footer { display: none; }

    /* --- Grid View Specifics --- */
    .vocab-wrapper.grid .vocab-main-row {
        display: block !important; 
        padding: 0 !important;
    }
    .vocab-wrapper.grid .vocab-word-group {
        display: block !important;
    }
    .vocab-wrapper.grid .ctx-block {
        display: none !important;
    }
    .vocab-wrapper.grid .word-text {
        pointer-events: none; 
        cursor: default;
        text-decoration: none !important;
    }

    /* List View Reset */
    .vocab-wrapper.list .vocab-card-inner { display: block; }
    .vocab-wrapper.list .vocab-face { display: block; position: static; border: none; box-shadow: none; background: transparent; }
    .vocab-wrapper.list .vocab-front { display: block; }
    .vocab-wrapper.list .vocab-back { display: none !important; }

    /* Level Badge */
    .vocab-level-badge {
        position: absolute;
        top: 12px;
        left: 12px;
        display: none; /* Hidden in list view */
        z-index: 10;
    }
    .vocab-wrapper.grid .vocab-level-badge { display: block; }

    /* Pagination Styles */
    .page-btn {
        width: 32px; height: 32px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 6px; font-size: 0.85rem; font-weight: 600;
        cursor: pointer; 
        background-color: var(--primary); color: var(--on-primary);
        opacity: 0.3; transition: all 0.2s;
        text-decoration: none !important;
        border: none;
    }
    .page-btn:hover { opacity: 0.7; transform: translateY(-1px); }
    .page-btn.active { opacity: 1; transform: scale(1.1); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    .page-btn.disabled { opacity: 0.1; cursor: default; transform: none; }
    
    .page-dots {
        display: flex; align-items: center; justify-content: center;
        width: 20px; height: 32px;
        font-weight: bold; opacity: 0.5; font-size: 1.2rem;
        padding-bottom: 4px;
    }
</style>

<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h2 style="font-weight: 400; letter-spacing: 1px; margin: 0;">{{ ui.my_vocab }}</h2>
    <div style="display: flex; gap: 4px;">
        <a href="?view=list&page={{page}}" class="view-btn {% if view_mode == 'list' %}active{% endif %}"><span class="material-symbols-outlined">view_list</span></a>
        <a href="?view=grid&page={{page}}" class="view-btn {% if view_mode == 'grid' %}active{% endif %}"><span class="material-symbols-outlined">grid_view</span></a>
    </div>
</div>

<div id="vocab-container">
    {% include 'partials/vocab_list.html' %}
</div>

<script>
var currentAudio = null;
async function playAudio(text, btn = null) {
    if (currentAudio) currentAudio.pause();
    const cleanText = text.trim();
    const res = await fetch('/api/tts', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text: cleanText})
    });
    const data = await res.json();
    currentAudio = new Audio(data.url);
    currentAudio.play();
    if (btn) btn.style.opacity = '1';
}

async function editWord(id, btn) {
    const container = document.getElementById('trans-' + id);
    // Перевірка, чи ми вже не в режимі редагування
    if (container.querySelector('input')) return;

    const currentText = container.innerText;
    const input = document.createElement('input');
    input.type = 'text';
    input.value = currentText;
    input.maxLength = 100;
    
    // Стилі для "безшовного" редагування
    input.style.width = '100%';
    input.style.border = 'none';
    input.style.borderBottom = '2px solid var(--primary)'; // Індикатор редагування
    input.style.background = 'transparent';
    input.style.color = 'inherit';
    input.style.font = 'inherit';
    input.style.outline = 'none';
    input.style.padding = '0';

    // --- UI: Зміна іконки на збереження ---
    let iconSpan = null;
    let originalOnClick = null;
    
    if (btn) {
        iconSpan = btn.querySelector('.material-symbols-outlined');
        if (iconSpan) iconSpan.innerText = 'check'; // Іконка галочки
        
        originalOnClick = btn.onclick;
        // Запобігаємо втраті фокусу при кліку на кнопку, щоб обробити клік вручну
        btn.onmousedown = (e) => e.preventDefault();
        btn.onclick = () => finish(true);
    }

    container.innerHTML = '';
    container.appendChild(input);
    input.focus();

    let isFinished = false;

    const finish = async (shouldSave) => {
        if (isFinished) return;
        isFinished = true;

        // Відновлення UI
        if (btn) {
            if (iconSpan) iconSpan.innerText = 'edit';
            btn.onmousedown = null;
            btn.onclick = originalOnClick;
        }

        const newText = input.value.trim();
        
        if (!shouldSave || !newText || newText === currentText) {
            container.innerText = currentText;
            return;
        }
        
        container.innerText = newText;
        try {
            await fetch('/api/update_word', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id: id, translation: newText})});
        } catch (e) {
            container.innerText = currentText;
            alert('{{ ui.error_alert }}');
        }
    };

    input.onkeydown = (e) => {
        if (e.key === 'Enter') input.blur(); // Викличе finish(true) через onblur
        if (e.key === 'Escape') {
            finish(false);
        }
    };
    input.onblur = () => finish(true);
}

async function toggleFav(id, btn) {
    const res = await fetch('/api/toggle_fav', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id: id})});
    if(res.ok) {
        const icon = btn.querySelector('.material-symbols-outlined');
        icon.classList.toggle('filled');
        btn.style.color = icon.classList.contains('filled') ? "#FFC107" : "var(--border)";
    }
}

function toggleCtx(id) {
    const el = document.getElementById('ctx-' + id);
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function handleCardClick(e, card) {
    // Only for grid view
    if (!card.closest('.vocab-wrapper.grid')) return;
    // Ignore clicks on buttons/inputs
    if (e.target.closest('button') || e.target.closest('input') || e.target.closest('a')) return;
    
    // Ignore if text is selected (allows selecting text on the back without flipping)
    if (window.getSelection().toString().length > 0) return;
    
    card.classList.toggle('flipped');
}

function handleCardLeave(card) {
    if (!card.classList.contains('flipped')) return;
    
    card.flipTimeout = setTimeout(() => {
        card.classList.remove('flipped');
        card.flipTimeout = null;
    }, 500);
}

function handleCardEnter(card) {
    if (card.flipTimeout) {
        clearTimeout(card.flipTimeout);
        card.flipTimeout = null;
    }
}
</script>
{% endblock %}
