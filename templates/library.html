{% extends "base.html" %}
{% block content %}
<style>
    .view-btn {
        background: transparent; border: 1px solid var(--border); color: var(--on-surface);
        width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center;
        cursor: pointer; border-radius: var(--radius); opacity: 0.6;
        text-decoration: none !important; /* Fix underline */
    }
    .view-btn.active { background: var(--primary); color: var(--on-primary); border-color: var(--primary); opacity: 1; }
    
    /* Grid Styles */
    .texts-container.grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
    }
    .texts-container.grid .card {
        margin-bottom: 0;
        height: 200px;
        display: flex;
        flex-direction: column;
        align-items: flex-start; 
        justify-content: space-between;
        box-sizing: border-box; 
    }
    .texts-container.grid .card > div:first-child {
        margin-bottom: 16px;
        width: 100%;
    }
    .texts-container.grid .card-actions {
        width: 100%;
        display: flex;
        justify-content: space-between;
        margin-top: auto;
    }

    /* Level Filter Styles */
    .lvl-filter {
        width: 32px; height: 32px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 6px; font-size: 0.8rem; font-weight: 600;
        cursor: pointer; border: 1px solid var(--border);
        background: var(--surface); color: var(--on-surface);
        opacity: 0.6; transition: all 0.2s;
        text-decoration: none !important;
    }
    .lvl-filter:hover { opacity: 1; transform: translateY(-1px); }
    .lvl-filter.active { opacity: 1; color: white; border-color: transparent; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    
    /* Active colors matching global styles */
    .lvl-filter.active[data-lvl="A1"] { background-color: #8BC34A; }
    .lvl-filter.active[data-lvl="A2"] { background-color: #4CAF50; }
    .lvl-filter.active[data-lvl="B1"] { background-color: #29B6F6; }
    .lvl-filter.active[data-lvl="B2"] { background-color: #1976D2; }
    .lvl-filter.active[data-lvl="C1"] { background-color: #D32F2F; }
    .lvl-filter.active[data-lvl="C2"] { background-color: #311B92; }

    /* Pagination Styles */
    .page-btn {
        width: 32px; height: 32px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 6px; font-size: 0.85rem; font-weight: 600;
        cursor: pointer; 
        background-color: var(--primary); color: var(--on-primary);
        opacity: 0.3; transition: all 0.2s;
        text-decoration: none !important;
        border: none;
    }
    .page-btn:hover { opacity: 0.7; transform: translateY(-1px); }
    .page-btn.active { opacity: 1; transform: scale(1.1); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    .page-btn.disabled { opacity: 0.1; cursor: default; transform: none; }
    
    .page-dots {
        display: flex; align-items: center; justify-content: center;
        width: 20px; height: 32px;
        font-weight: bold; opacity: 0.5; font-size: 1.2rem;
        padding-bottom: 4px;
    }
</style>

<div id="library-container">
    {% include 'partials/library_list.html' %}
</div>

<script>
async function toggleTextFav(e, id, btn) {
    if(e) {
        e.preventDefault();
        e.stopPropagation();
    }
    
    const icon = btn.querySelector('.material-symbols-outlined');
    const isFav = icon.classList.contains('filled');
    
    // Optimistic UI update
    if (isFav) {
        icon.classList.remove('filled');
        icon.style.color = '';
        btn.style.color = 'var(--on-surface)';
        btn.style.opacity = '0.3';
    } else {
        icon.classList.add('filled');
        icon.style.color = '#d32f2f !important';
        btn.style.color = '#d32f2f';
        btn.style.opacity = '1';
    }
    
    await fetch('/api/toggle_text_fav', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id: id})});
}
</script>
{% endblock %}
