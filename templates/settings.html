{% extends "base.html" %}
{% block content %}
<style>
    .settings-container { max-width: 500px; margin: 40px auto; }
    .form-group { margin-bottom: 20px; text-align: left; }
    .form-label { font-size: 0.85rem; font-weight: 500; margin-bottom: 8px; display: block; opacity: 0.8; }
    .form-control {
        width: 100%; padding: 12px; border: 1px solid var(--border);
        border-radius: var(--radius); background: var(--bg); color: var(--on-surface);
        font-size: 16px; box-sizing: border-box; transition: all 0.2s;
    }
    .form-control:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1); }
    .btn-group { display: flex; gap: 10px; margin-top: 20px; }
</style>
<div class="card settings-container">
    <h2 style="margin-top:0;">{{ ui.settings }}</h2>
    <form method="POST">
        <div class="form-group">
            <label for="language" class="form-label">{{ ui.interface_lang }}</label>
            <select class="form-control" name="language" id="language">
                <option value="ukr" {% if lang == 'ukr' %}selected{% endif %}>
                    🇺🇦 Українська
                </option>
                <option value="eng" {% if lang == 'eng' %}selected{% endif %}>
                    🇬🇧 English
                </option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Розмір сесії повторення (слів)</label>
            <input type="number" name="vocab_session_size" class="form-control" value="{{ current_user.vocab_session_size }}" min="1" max="100">
        </div>
        <div class="btn-group">
            <button type="submit" class="btn-contained">{{ ui.save_settings }}</button>
            <a href="{{ next_url or url_for('index') }}" class="btn-text">{{ ui.back }}</a>
        </div>
    </form>
</div>
{% endblock %}
